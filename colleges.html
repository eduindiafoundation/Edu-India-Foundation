    const container = document.getElementById('collegesContainer');
    const searchBar = document.getElementById('searchBar');
    const stateFilter = document.getElementById('stateFilter');

    function renderColleges() {
      container.innerHTML = '';
      const search = searchBar.value.toLowerCase();
      const state = stateFilter.value;

      colleges.filter(college => {
        const matchName = college.name.toLowerCase().includes(search);
        const matchState = state === '' || college.state === state;
        return matchName && matchState;
      }).forEach(college => {
        container.innerHTML += `
          <div class="college-card" data-aos="fade-up">
            <h2>${college.name}</h2>
            <p><strong>Location:</strong> ${college.location}</p>
            <p><strong>Annual Fees:</strong> ₹${college.fees}</p>
            <p><strong>State:</strong> ${college.state}</p>
          </div>
        `;
      });
      AOS.refresh();
    }

    searchBar.addEventListener('input', renderColleges);
    stateFilter.addEventListener('change', renderColleges);
    window.onload = renderColleges;
  </script>
